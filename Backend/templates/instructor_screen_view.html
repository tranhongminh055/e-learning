<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Instructor Screen View</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; }
        img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>
    <img id="screenImage" alt="Màn hình sinh viên" />
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const username = urlParams.get('username');
        const API_BASE = window.location.origin;
        if(username) {
            document.getElementById('screenImage').src = `${API_BASE}/api/monitor/stream_screen?username=${username}`;
        }
    </script>
</body>
</html>
