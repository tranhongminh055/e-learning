<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Instructor Monitor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .name {
            font-weight: bold;
            margin-bottom: 5px;
            color: #2c3e50;
        }

        .username {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .streams-container {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .video-container {
            flex: 1;
            height: 350px;
            background: #000;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
        }

        .stream-label {
            position: absolute;
            top: 5px;
            left: 5px;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 6px;
            font-size: 11px;
            border-radius: 4px;
            z-index: 10;
            pointer-events: none;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .btn {
            padding: 8px 16px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn:hover {
            background: #2980b9;
        }

        @keyframes flashRed {
            0% {
                box-shadow: 0 0 15px rgba(231, 76, 60, 1);
                border-color: #e74c3c;
                background-color: #ffeaea;
            }

            50% {
                box-shadow: 0 0 5px rgba(231, 76, 60, 0.3);
                border-color: transparent;
                background-color: white;
            }

            100% {
                box-shadow: 0 0 15px rgba(231, 76, 60, 1);
                border-color: #e74c3c;
                background-color: #ffeaea;
            }
        }

        .violating {
            animation: flashRed 1s infinite;
            border: 2px solid transparent;
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

        // Thay thông tin này bằng cấu hình Firebase của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyAUUfwKLCFt0Ksp2Y6GLICl63eXspZ2YTs",
            authDomain: "vibio-8391c.firebaseapp.com",
            projectId: "vibio-8391c",
            storageBucket: "vibio-8391c.firebasestorage.app",
            messagingSenderId: "698117206135",
            appId: "1:698117206135:web:adb4363661309b91c71672",
            measurementId: "G-ND2LNGQHJ0",
            databaseURL: "https://vibio-8391c-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db;
        window.ref = ref;
        window.onValue = onValue;
        window.get = get;
    </script>
</head>

<body>
    <div class="header">
        <div class="title">Giám sát tổng quan sinh viên</div>
    </div>

    <div id="studentGrid" class="grid">
        <p style="color:#777; grid-column: 1 / -1;">Đang tải danh sách sinh viên...</p>
    </div>

    <script>
        const grid = document.getElementById('studentGrid');


        // Đợi Firebase load xong
        const checkFirebase = setInterval(() => {
            if (!window.db) return;
            clearInterval(checkFirebase);
            if (grid.querySelector('p') && grid.querySelector('p').innerText.includes('Lỗi')) {
                grid.innerHTML = '<p style="color:#777; grid-column: 1 / -1;">Đang tải danh sách sinh viên...</p>';
            }

            const activePeersRef = window.ref(window.db, 'active_peers');

            window.onValue(activePeersRef, async (snapshot) => {
                const data = snapshot.val();

                if (!data) {
                    grid.innerHTML = '<p style="color:#777; grid-column: 1 / -1;">Hiện chưa có sinh viên nào đang trong phiên thi.</p>';
                    return;
                } else if (grid.querySelector('p')) {
                    grid.innerHTML = '';
                }

                const currentUsernames = new Set(Object.keys(data));

                for (const username of currentUsernames) {
                    const studentData = data[username];

                    // Lấy tên đầy đủ từ users/
                    let fullName = username;
                    try {
                        // Tra cứu UID từ username
                        const usernameRef = window.ref(window.db, `usernames/${username}`);
                        const usernameSnap = await window.get(usernameRef);
                        if (usernameSnap.exists()) {
                            const uid = usernameSnap.val();
                            const userRef = window.ref(window.db, `users/${uid}`);
                            const userSnap = await window.get(userRef);
                            if (userSnap.exists()) {
                                fullName = userSnap.val().full_name || username;
                            }
                        }
                    } catch (e) { }

                    let card = document.getElementById(`card-${username}`);
                    if (!card) {
                        card = document.createElement('div');
                        card.id = `card-${username}`;
                        card.className = 'card';
                        card.onclick = () => window.open(`instructor_view.html?username=${username}&v=${Date.now()}`, '_blank');

                        const nameInfo = document.createElement('div');
                        nameInfo.innerHTML = `<div class="name">${fullName}</div><div class="username">${username}</div>`;

                        const streamsContainer = document.createElement('div');
                        streamsContainer.className = 'streams-container';

                        const urlParams = new URLSearchParams(window.location.search);
                        const mode = urlParams.get('mode');

                        if (mode !== 'screen') {
                            // Container Camera
                            const cameraContainer = document.createElement('div');
                            cameraContainer.className = 'video-container';
                            cameraContainer.innerHTML = '<div class="stream-label">Camera</div>';

                            const video = document.createElement('video');
                            video.id = `video-${username}`;
                            video.autoplay = true;
                            video.playsInline = true;
                            cameraContainer.appendChild(video);
                            streamsContainer.appendChild(cameraContainer);
                        }

                        if (mode !== 'camera') {
                            // Container Màn hình
                            const screenContainer = document.createElement('div');
                            screenContainer.className = 'video-container';
                            screenContainer.innerHTML = '<div class="stream-label">Màn hình</div>';

                            const screenImg = document.createElement('img');
                            screenImg.id = `screen-${username}`;
                            screenContainer.appendChild(screenImg);
                            streamsContainer.appendChild(screenContainer);
                        }

                        card.appendChild(nameInfo);
                        card.appendChild(streamsContainer);
                        grid.appendChild(card);
                    }

                    // Tải ảnh màn hình nếu không phải mode camera
                    const urlParams2 = new URLSearchParams(window.location.search);
                    if (urlParams2.get('mode') !== 'camera') {
                        const screenRef = window.ref(window.db, `screens/${username}/frame`);
                        window.onValue(screenRef, (snap) => {
                            if (snap.exists()) {
                                const img = document.getElementById(`screen-${username}`);
                                if (img) img.src = "data:image/jpeg;base64," + snap.val();
                            }
                        });
                    }

                    if (studentData.is_violating === "true" || studentData.is_violating === true) {
                        card.classList.add('violating');
                    } else {
                        card.classList.remove('violating');
                    }
                }

                Array.from(grid.children).forEach(child => {
                    if (child.id && child.id.startsWith('card-')) {
                        const username = child.id.replace('card-', '');
                        if (!currentUsernames.has(username)) {
                            child.remove();
                        }
                    }
                });
            });
        }, 1000);


    </script>
</body>

</html>
